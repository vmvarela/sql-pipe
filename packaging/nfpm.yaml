# nfpm package configuration for sql-pipe
# Used by the CI release workflow to generate .deb and .rpm packages.
#
# Variables injected by the CI environment before invoking nfpm:
#   VERSION  — semver without leading "v" (e.g. "0.2.0")
#   GOARCH   — nfpm architecture token:
#                amd64   → x86_64 binaries  (deb: amd64,   rpm: x86_64)
#                arm64   → aarch64 binaries (deb: arm64,   rpm: aarch64)
#                arm7    → armv7 binaries   (deb: armhf,   rpm: armhfp)
#                386     → x86 binaries     (deb: i386,    rpm: i686)
#
# Invocation (from the CI working directory that contains the staged files):
#   VERSION=0.2.0 GOARCH=amd64 nfpm package -p deb -f packaging/nfpm.yaml -t dist/
#   VERSION=0.2.0 GOARCH=amd64 nfpm package -p rpm  -f packaging/nfpm.yaml -t dist/

name: sql-pipe
arch: "${GOARCH}"
version: "${VERSION}"
maintainer: vmvarela <vmvarela@gmail.com>
description: Read CSV from stdin, query with SQL, write CSV to stdout
homepage: https://github.com/vmvarela/sql-pipe
license: MIT

contents:
  # Binary — installed into /usr/bin and made executable
  - src: ./sql-pipe
    dst: /usr/bin/sql-pipe
    file_info:
      mode: 0755

  # Man page — gzipped under /usr/share/man/man1/ (both deb and rpm)
  - src: ./sql-pipe.1.gz
    dst: /usr/share/man/man1/sql-pipe.1.gz

  # License — Debian policy: copyright file under /usr/share/doc/<pkg>/
  - src: ./LICENSE
    dst: /usr/share/doc/sql-pipe/copyright
    packager: deb

  # License — RPM convention: under /usr/share/licenses/<pkg>/
  - src: ./LICENSE
    dst: /usr/share/licenses/sql-pipe/LICENSE
    packager: rpm
